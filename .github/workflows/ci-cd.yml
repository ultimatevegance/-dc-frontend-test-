name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Only one deployment can run at a time; cancel stale runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # CI — runs on every push and every PR
  # ────────────────────────────────────────────────────────────────────────────
  ci:
    name: Type-check & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm          # caches ~/.pnpm-store between runs

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm type-check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # Set the correct base path so assets load on GitHub Pages
          VITE_BASE: /${{ github.event.repository.name }}/

      # Upload the dist/ folder as a Pages artifact — only needed on main
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ────────────────────────────────────────────────────────────────────────────
  # CD — deploys to GitHub Pages, only after CI passes on main
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      pages: write      # allows writing to GitHub Pages
      id-token: write   # required by the OIDC token for Pages deployment

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
